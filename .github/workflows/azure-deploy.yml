name: Deploy Innoira Suite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  BACKEND_URL: https://innoira-api.azurewebsites.net
  AZURE_RG: rg-innoira
  BACKEND_NAME: innoira-api
  FRONTEND_NAME: innoira-app

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable Oryx build
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.BACKEND_NAME }} \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Package and deploy backend
        run: |
          cd backend
          python -c "
import zipfile, os
z = zipfile.ZipFile('/tmp/deploy.zip', 'w', zipfile.ZIP_DEFLATED)
for r, dirs, fs in os.walk('.'):
    dirs[:] = [d for d in dirs if d != '__pycache__']
    for f in fs:
        path = os.path.join(r, f)
        arcname = os.path.relpath(path, '.').replace('\\', '/')
        z.write(path, arcname)
z.close()
"
          az webapp deploy \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.BACKEND_NAME }} \
            --src-path /tmp/deploy.zip \
            --type zip

      - name: Verify deployment
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.BACKEND_NAME }}.azurewebsites.net/api/health 2>/dev/null)
            if [ "$status" = "200" ]; then
              echo "Backend is up (HTTP $status)"
              break
            fi
            echo "Attempt $i: HTTP $status — waiting..."
            sleep 10
          done

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build
        env:
          REACT_APP_BACKEND_URL: ${{ env.BACKEND_URL }}

      - name: Deploy to Static Web App
        run: |
          npx @azure/static-web-apps-cli deploy \
            frontend/build \
            --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

      - name: Verify deployment
        run: |
          host=$(az staticwebapp show \
            --name ${{ env.FRONTEND_NAME }} \
            --resource-group ${{ env.AZURE_RG }} \
            --query "defaultHostname" -o tsv)
          echo "Frontend: https://$host"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" "https://$host/"
