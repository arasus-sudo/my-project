name: Deploy Innoira Suite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  BACKEND_URL: https://innoira-api.azurewebsites.net
  AZURE_RG: rg-innoira
  BACKEND_NAME: innoira-api
  FRONTEND_NAME: innoira-app

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable Oryx build
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.BACKEND_NAME }} \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Package and deploy backend
        run: |
          cd backend
          zip -r /tmp/deploy.zip . -x "*__pycache__*" "*venv*" "*.venv*" ".git*"
          az webapp deploy \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.BACKEND_NAME }} \
            --src-path /tmp/deploy.zip \
            --type zip

      - name: Verify deployment
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.BACKEND_NAME }}.azurewebsites.net/docs 2>/dev/null)
            if [ "$status" != "000" ] && [ "$status" != "" ]; then
              echo "Backend is up (HTTP $status)"
              break
            fi
            echo "Attempt $i: HTTP $status — waiting..."
            sleep 10
          done

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build
        env:
          REACT_APP_BACKEND_URL: ${{ env.BACKEND_URL }}

      - name: Deploy to Static Web App
        run: |
          npx @azure/static-web-apps-cli deploy \
            frontend/build \
            --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

      - name: Verify deployment
        run: |
          host=$(az staticwebapp show \
            --name ${{ env.FRONTEND_NAME }} \
            --resource-group ${{ env.AZURE_RG }} \
            --query "defaultHostname" -o tsv 2>/dev/null)
          if [ -n "$host" ]; then
            echo "Frontend: https://$host"
            curl -s -o /dev/null -w "HTTP %{http_code}\n" "https://$host/"
          else
            echo "Could not verify frontend"
          fi
