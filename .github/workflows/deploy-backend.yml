name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths: [backend/**]

env:
  BACKEND_NAME: innoira-api
  AZURE_RG: rg-innoira

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package and deploy backend
        run: |
          cd backend
          zip -r /tmp/deploy.zip . -x "*__pycache__*" "*venv*" "*.venv*" ".git*"
          az webapp deploy \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.BACKEND_NAME }} \
            --src-path /tmp/deploy.zip \
            --type zip
